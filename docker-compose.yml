version: '3.8'

services:
  # --- INFRASTRUCTURE ---
  db:
    image: postgres:15-alpine
    container_name: bidnow-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=bidnow
      - POSTGRES_PASSWORD=bidnow
      - POSTGRES_DB=bidnow_root
    volumes:
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidnow -d bidnow_root"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bidnow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:latest
    container_name: bidnow-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes

  # --- BACKEND SERVICES ---
  discovery-service:
    build:
      context: ./backend
      dockerfile: discovery-service/Dockerfile
    container_name: bidnow-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: bidnow-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      discovery-service:
        condition: service_healthy

  identity-service:
    build:
      context: ./backend
      dockerfile: identity-service/Dockerfile
    container_name: bidnow-identity
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - DB_URL=jdbc:postgresql://db:5432/identity_db
      - DB_USERNAME=bidnow
      - DB_PASSWORD=bidnow
    depends_on:
      db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    container_name: bidnow-user
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - DB_URL=jdbc:postgresql://db:5432/user_db
      - DB_USERNAME=bidnow
      - DB_PASSWORD=bidnow
    depends_on:
      db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  auction-service:
    build:
      context: ./backend
      dockerfile: auction-service/Dockerfile
    container_name: bidnow-auction
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - DB_URL=jdbc:postgresql://db:5432/auction_db
      - DB_USERNAME=bidnow
      - DB_PASSWORD=bidnow
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_started

  bidding-service:
    build:
      context: ./backend
      dockerfile: bidding-service/Dockerfile
    container_name: bidnow-bidding
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - DB_URL=jdbc:postgresql://db:5432/bidding_db
      - DB_USERNAME=bidnow
      - DB_PASSWORD=bidnow
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy

  wallet-service:
    build:
      context: ./backend
      dockerfile: wallet-service/Dockerfile
    container_name: bidnow-wallet
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - DB_URL=jdbc:postgresql://db:5432/wallet_db
      - DB_USERNAME=bidnow
      - DB_PASSWORD=bidnow
    depends_on:
      db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  media-service:
    build:
      context: ./backend
      dockerfile: media-service/Dockerfile
    container_name: bidnow-media
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - DB_URL=jdbc:postgresql://db:5432/media_db
      - DB_USERNAME=bidnow
      - DB_PASSWORD=bidnow
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
    depends_on:
      db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_started

  # --- FRONTEND ---
  frontend:
    build:
      context: ./frontend
    container_name: bidnow-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:8080
    depends_on:
      - api-gateway

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bidnow-kafka-ui
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=bidnow-kafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_started

  # --- TOOLS ---
  mailpit:
    image: axllent/mailpit:latest
    container_name: bidnow-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

networks:
  default:
    name: bidnow-network
