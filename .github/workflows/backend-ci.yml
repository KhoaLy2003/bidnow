name: Backend CI

on:
  pull_request:
    branches: [main, develop, ci-test]
    paths:
      - "backend/**"
  push:
    branches: [main, develop, ci-test]
    paths:
      - "backend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean verify -DskipTests

      - name: Run Unit Tests
        run: |
          cd backend
          ./mvnw test -pl common
          # For other services, we might need a DB, so for basic CI we skip heavy integration tests 
          # or use H2/Containers if configured.
