name: Backend CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  build:
    name: Backend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: mvn package -DskipTests
        working-directory: backend

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      checks: write
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci_password
          POSTGRES_USER: ci_user
          POSTGRES_DB: bidnow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_URL: jdbc:postgresql://localhost:5432/bidnow_ci
      DB_USERNAME: ci_user
      DB_PASSWORD: ci_password
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Run unit tests
        run: mvn test
        working-directory: backend
      - name: Publish unit test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: "backend/**/target/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: true
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: backend/**/target/site/jacoco/
          retention-days: 7

  bdd-test:
    name: BDD Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      checks: write
      contents: read
    env:
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Install shared modules
        run: mvn install -pl .,common,bdd-support -DskipTests -q
        working-directory: backend
      - name: Run BDD tests
        run: mvn test -Pbdd -pl identity-service,user-service,auction-service -DfailIfNoTests=false
        working-directory: backend
      - name: Publish BDD test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: BDD Tests
          path: "backend/**/target/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: true
      - name: Upload Cucumber reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-reports
          path: backend/**/target/cucumber-reports/
          retention-days: 7
