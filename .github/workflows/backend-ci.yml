name: Backend CI

on:
  pull_request:
    branches: [main, develop, ci-test]
    paths:
      - "backend/**"
  push:
    branches: [main, develop, ci-test]
    paths:
      - "backend/**"

jobs:
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: mvn package -DskipTests
        working-directory: backend
