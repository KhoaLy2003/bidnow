name: Backend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
  push:
    branches: [main, develop]
    paths:
      - "backend/**"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: mvn package -DskipTests
        working-directory: backend

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      checks: write
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci_password
          POSTGRES_USER: ci_user
          POSTGRES_DB: bidnow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Uncomment if BDD tests fail with Kafka connection errors:
      # kafka:
      #   image: confluentinc/cp-kafka:7.6.0
      #   env:
      #     KAFKA_BROKER_ID: 1
      #     KAFKA_ZOOKEEPER_CONNECT: ""
      #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      #     KAFKA_PROCESS_ROLES: broker,controller
      #     KAFKA_NODE_ID: 1
      #     KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      #     CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      #   ports:
      #     - 9092:9092
    env:
      DB_URL: jdbc:postgresql://localhost:5432/bidnow_ci
      DB_USERNAME: ci_user
      DB_PASSWORD: ci_password
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      JWT_SECRET: Ymlkbm93LWNpLXRlc3Qtc2VjcmV0LWtleS1mb3ItZ2l0aHViLWFjdGlvbnMtMzJi
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Run all tests
        run: mvn test
        working-directory: backend
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: "backend/**/target/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: true
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: backend/**/target/site/jacoco/
          retention-days: 7
