spring:
  cloud:
    discovery:
      enabled: false
  jpa:
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-bdd.xml
  kafka:
    consumer:
      auto-offset-reset: earliest

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  tracing:
    enabled: false
